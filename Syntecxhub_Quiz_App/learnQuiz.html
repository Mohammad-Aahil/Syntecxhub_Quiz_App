<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <style>
    .card {
      transition: all 0.3s ease;
    }

    #quiz-box.fade {
      opacity: 0;
      transform: translateX(-20px);
    }
  </style>
  <body class="bg-light">
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div class="card shadow p-4" style="width: 400px">
        <h3 class="text-center mb-3">Programming Quiz</h3>

        <div id="quiz-box">
          <h5 id="question" class="mb-3"></h5>

          <div id="options" class="d-grid gap-2"></div>

          <button id="nextBtn" class="btn btn-primary mt-3 w-100">Next</button>
        </div>

        <div id="result-box" class="text-center" style="display: none">
          <h3>Your Score</h3>
          <h1 class="text-success"></h1>
          <button class="btn btn-success mt-2" onclick="location.reload()">
            Restart
          </button>
        </div>
      </div>
    </div>
